openapi: 3.0.3
info:
  title: Bike Shop REST API
  description: |
    REST API за управление на мотоциклетите, клиентите и наемането в Bike Shop.
    Приложението е реализирано в Salesforce с три основни ресурса.
  version: 1.0.0
  contact:
    name: Aleksandar Aleksandrov
    email: aleksander.aleksandrov923@gmail.com
  license:
    name: MIT

servers:
  - url: https://stu2401322033.c9195e8f6294.develop.my.salesforce.com/services/apexrest/bikeshop/v1
    description: Salesforce Org - Development

security:
  - bearerAuth: []

tags:
  - name: Bikes
    description: Операции с мотоциклети
  - name: Customers
    description: Операции с клиенти
  - name: Rentals
    description: Операции с наемания

paths:
  /bikes:
    get:
      tags:
        - Bikes
      summary: Лист на всички мотоциклети
      description: Получава пагинирана лист на всички мотоциклети със възможност за търсене и филтриране
      operationId: getBikes
      parameters:
        - name: page
          in: query
          description: Номер на страницата (начало от 1)
          schema:
            type: integer
            default: 1
            minimum: 1
            example: 1
        - name: pageSize
          in: query
          description: Брой записи на страница (макс 100)
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 100
            example: 10
        - name: search
          in: query
          description: Търсене по име, модел или марка
          schema:
            type: string
            example: "Honda"
        - name: category
          in: query
          description: Филтър по категория
          schema:
            type: string
            enum: [Mountain, Road, Cruiser, Hybrid]
            example: "Mountain"
        - name: available
          in: query
          description: Филтър по наличност
          schema:
            type: boolean
            example: true
      responses:
        '200':
          description: Успешна операция
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BikeListResponse'
              examples:
                success:
                  value:
                    records:
                      - id: "a02dM00000YaPY1QAN"
                        name: "Mountain Bike Pro"
                        model: "MTB-2024"
                        brand: "Trek"
                        category: "Mountain"
                        dailyRate: 25.00
                        available: true
                        mileage: 150
                        lastServiceDate: "2026-02-15"
                    total: 5
                    page: 1
                    pageSize: 10
        '400':
          description: Невалидни параметри
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidPage:
                  value:
                    error: "Invalid page number. Page must be a positive integer."
                    statusCode: 400
                invalidPageSize:
                  value:
                    error: "Page size must be between 1 and 100."
                    statusCode: 400
        '401':
          description: Отсътства или невалиден токен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingToken:
                  value:
                    error: "Missing or invalid authentication token."
                    statusCode: 401

    post:
      tags:
        - Bikes
      summary: Создание на нова мотоциклета
      description: Създава нова мотоциклета в системата
      operationId: createBike
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BikeInput'
            examples:
              createBike:
                value:
                  name: "City Bike"
                  model: "CB-100"
                  brand: "Giant"
                  category: "Hybrid"
                  dailyRate: 15.00
                  available: true
                  mileage: 0
      responses:
        '201':
          description: Мотоциклета успешно създадена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BikeDto'
              examples:
                success:
                  value:
                    id: "a02dM00000YaPY1QAN"
                    name: "Giant City Bike"
                    model: "CB-100"
                    brand: "Giant"
                    category: "Hybrid"
                    dailyRate: 15.00
                    available: true
                    mileage: 0
                    lastServiceDate: null
        '400':
          description: Невалидни входни данни
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingModel:
                  value:
                    error: "Model is required and cannot be blank."
                    statusCode: 400
                missingBrand:
                  value:
                    error: "Brand is required and cannot be blank."
                    statusCode: 400
                negativeDailyRate:
                  value:
                    error: "Daily Rate cannot be negative."
                    statusCode: 400
        '401':
          description: Отсътства или невалиден токен
        '403':
          description: Нямаш разрешение за създание
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                noCreateAccess:
                  value:
                    error: "No create access to Bike."
                    statusCode: 403

  /bikes/{id}:
    get:
      tags:
        - Bikes
      summary: Получи мотоциклета по ID
      description: Получава информация за конкретна мотоциклета
      operationId: getBikeById
      parameters:
        - name: id
          in: path
          required: true
          description: ID на мотоциклетата
          schema:
            type: string
            example: "a02dM00000YaPY1QAN"
      responses:
        '200':
          description: Успешна операция
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BikeDto'
              examples:
                success:
                  value:
                    id: "a02dM00000YaPY1QAN"
                    name: "Mountain Bike Pro"
                    model: "MTB-2024"
                    brand: "Trek"
                    category: "Mountain"
                    dailyRate: 25.00
                    available: true
                    mileage: 150
                    lastServiceDate: "2026-02-15"
        '404':
          description: Мотоциклета не намерена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                notFound:
                  value:
                    error: "Bike not found for ID a02dM00000Invalid."
                    statusCode: 404
        '401':
          description: Отсътства или невалиден токен

    patch:
      tags:
        - Bikes
      summary: Обновяване на мотоциклета
      description: Частично обновяване на данните на мотоциклетата
      operationId: updateBike
      parameters:
        - name: id
          in: path
          required: true
          description: ID на мотоциклетата
          schema:
            type: string
            example: "a02dM00000YaPY1QAN"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BikeInput'
            examples:
              updateBike:
                value:
                  dailyRate: 30.00
                  mileage: 250
      responses:
        '200':
          description: Мотоциклета успешно обновена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BikeDto'
              examples:
                success:
                  value:
                    id: "a02dM00000YaPY1QAN"
                    name: "Mountain Bike Pro"
                    model: "MTB-2024"
                    brand: "Trek"
                    category: "Mountain"
                    dailyRate: 30.00
                    available: true
                    mileage: 250
                    lastServiceDate: "2026-02-20"
        '400':
          description: Невалидни входни данни
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                negativeMileage:
                  value:
                    error: "Mileage cannot be negative."
                    statusCode: 400
        '404':
          description: Мотоциклета не намерена
        '401':
          description: Отсътства или невалиден токен
        '403':
          description: Нямаш разрешение за обновяване

    delete:
      tags:
        - Bikes
      summary: Изтриване на мотоциклета
      description: Премахва мотоциклета от системата
      operationId: deleteBike
      parameters:
        - name: id
          in: path
          required: true
          description: ID на мотоциклетата
          schema:
            type: string
            example: "a02dM00000YaPY1QAN"
      responses:
        '204':
          description: Мотоциклета успешно изтрита
        '404':
          description: Мотоциклета не намерена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                notFound:
                  value:
                    error: "Bike not found for ID a02dM00000Invalid."
                    statusCode: 404
        '401':
          description: Отсътства или невалиден токен
        '403':
          description: Нямаш разрешение за изтриване
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                noDeletAccess:
                  value:
                    error: "No delete access to Bike."
                    statusCode: 403

  /customers:
    get:
      tags:
        - Customers
      summary: Лист на всички клиенти
      description: Получава пагинирана лист на всички клиенти със възможност за търсене
