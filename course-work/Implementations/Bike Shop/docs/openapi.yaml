          in: query
          description: Търсене по име или имейл
          schema:
            type: string
            example: "Aleksandar"
        - name: isActive
          in: query
          description: Филтър по активност
          schema:
            type: boolean
            example: true
      responses:
        '200':
          description: Успешна операция
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerListResponse'
              examples:
                success:
                  value:
                    records:
                      - id: "a03dM00000YaPY2QAN"
                        name: "Aleksandar Aleksandrov"
                        firstName: "Aleksandar"
                        lastName: "Aleksandrov"
                        email: "aleksander.aleksandrov923@gmail.com"
                        phone: "0878955771"
                        birthDate: null
                        loyaltyPoints: 0
                        isActive: true
                      - id: "a03dM00000YaPY3QAN"
                        name: "Ivan Petrov"
                        firstName: "Ivan"
                        lastName: "Petrov"
                        email: "ivan.petrov@example.com"
                        phone: "0888123456"
                        birthDate: "1990-05-15"
                        loyaltyPoints: 150
                        isActive: true
                    total: 2
                    page: 1
                    pageSize: 10
        '400':
          description: Невалидни параметри
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidPage:
                  value:
                    error: "Invalid page number. Page must be a positive integer."
                    statusCode: 400
        '401':
          description: Отсътства или невалиден токен

    post:
      tags:
        - Customers
      summary: Създание на нов клиент
      description: Създава нов клиент в системата
      operationId: createCustomer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerInput'
            examples:
              createCustomer:
                value:
                  firstName: "John"
                  lastName: "Doe"
                  email: "john.doe@example.com"
                  phone: "0888123456"
                  birthDate: "1990-05-15"
      responses:
        '201':
          description: Клиент успешно създаден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerDto'
              examples:
                success:
                  value:
                    id: "a03dM00000YaPY2QAN"
                    name: "John Doe"
                    firstName: "John"
                    lastName: "Doe"
                    email: "john.doe@example.com"
                    phone: "0888123456"
                    birthDate: "1990-05-15"
                    loyaltyPoints: 0
                    isActive: true
        '400':
          description: Невалидни входни данни
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingFirstName:
                  value:
                    error: "First Name is required and cannot be blank."
                    statusCode: 400
                missingLastName:
                  value:
                    error: "Last Name is required and cannot be blank."
                    statusCode: 400
                missingEmail:
                  value:
                    error: "Email is required and cannot be blank."
                    statusCode: 400
                invalidPhoneFormat:
                  value:
                    error: "Phone number format is invalid. Use format like: +359 88 123 4567 or 0888123456"
                    statusCode: 400
        '401':
          description: Отсътства или невалиден токен
        '403':
          description: Нямаш разрешение за създание
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                noCreateAccess:
                  value:
                    error: "No create access to Customer."
                    statusCode: 403

