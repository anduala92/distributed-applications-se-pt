  /rentals:
    get:
      tags:
        - Rentals
      summary: Лист на всички наемания
      description: Получава пагинирана лист на всички наемания със възможност за филтриране
      operationId: getRentals
      parameters:
        - name: page
          in: query
          description: Номер на страницата (начало от 1)
          schema:
            type: integer
            default: 1
            minimum: 1
            example: 1
        - name: pageSize
          in: query
          description: Брой записи на страница (макс 100)
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 100
            example: 10
        - name: status
          in: query
          description: Филтър по статус
          schema:
            type: string
            enum: [Active, Completed, Cancelled]
            example: "Active"
        - name: paid
          in: query
          description: Филтър по платежен статус
          schema:
            type: boolean
            example: true
      responses:
        '200':
          description: Успешна операция
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RentalListResponse'
              examples:
                success:
                  value:
                    records:
                      - id: "a04dM00000YaPY3QAN"
                        bikeId: "a02dM00000YaPY1QAN"
                        bikeName: "Mountain Bike Pro"
                        customerId: "a03dM00000YaPY2QAN"
                        customerName: "Aleksandar Aleksandrov"
                        startDate: "2026-03-01"
                        endDate: "2026-03-05"
                        dailyPrice: 25.00
                        totalAmount: 100.00
                        status: "Active"
                        paid: false
                      - id: "a04dM00000YaPY4QAN"
                        bikeId: "a02dM00000YaPY2QAN"
                        bikeName: "City Bike"
                        customerId: "a03dM00000YaPY3QAN"
                        customerName: "Ivan Petrov"
                        startDate: "2026-03-10"
                        endDate: "2026-03-12"
                        dailyPrice: 15.00
                        totalAmount: 30.00
                        status: "Completed"
                        paid: true
                    total: 2
                    page: 1
                    pageSize: 10
        '400':
          description: Невалидни параметри
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidStatus:
                  value:
                    error: "Invalid status filter. Valid values are: Active, Completed, Cancelled"
                    statusCode: 400
        '401':
          description: Отсътства или невалиден токен

    post:
      tags:
        - Rentals
      summary: Създание на ново наемание
      description: Създава ново наемание в системата
      operationId: createRental
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RentalInput'
            examples:
              createRental:
                value:
                  bikeId: "a02dM00000YaPY1QAN"
                  customerId: "a03dM00000YaPY2QAN"
                  startDate: "2026-03-10"
                  endDate: "2026-03-15"
      responses:
        '201':
          description: Наемание успешно създадено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RentalDto'
              examples:
                success:
                  value:
                    id: "a04dM00000YaPY3QAN"
                    bikeId: "a02dM00000YaPY1QAN"
                    bikeName: "Mountain Bike Pro"
                    customerId: "a03dM00000YaPY2QAN"
                    customerName: "Aleksandar Aleksandrov"
                    startDate: "2026-03-10"
                    endDate: "2026-03-15"
                    dailyPrice: 25.00
                    totalAmount: 125.00
                    status: "Active"
                    paid: false
        '400':
          description: Невалидни входни данни
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingBike:
                  value:
                    error: "Bike is required and cannot be blank."
                    statusCode: 400
                missingCustomer:
                  value:
                    error: "Customer is required and cannot be blank."
                    statusCode: 400
                endDateBeforeStart:
                  value:
                    error: "End Date cannot be before Start Date."
                    statusCode: 400
                negativeDailyPrice:
                  value:
                    error: "Daily Price cannot be negative."
                    statusCode: 400
        '401':
          description: Отсътства или невалиден токен
        '403':
          description: Нямаш разрешение за създание
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                noCreateAccess:
                  value:
                    error: "No create access to Bike Rental."
                    statusCode: 403

  /rentals/{id}:
    get:
      tags:
        - Rentals
      summary: Получи наемането по ID
      description: Получава информация за конкретно наемание
      operationId: getRentalById
      parameters:
        - name: id
          in: path
          required: true
          description: ID на наемането
          schema:
            type: string
            example: "a04dM00000YaPY3QAN"
      responses:
        '200':
          description: Успешна операция
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RentalDto'
              examples:
                success:
                  value:
                    id: "a04dM00000YaPY3QAN"
                    bikeId: "a02dM00000YaPY1QAN"
                    bikeName: "Mountain Bike Pro"
                    customerId: "a03dM00000YaPY2QAN"
                    customerName: "Aleksandar Aleksandrov"
                    startDate: "2026-03-01"
                    endDate: "2026-03-05"
                    dailyPrice: 25.00
                    totalAmount: 100.00
                    status: "Active"
                    paid: false
        '404':
          description: Наемането не намерено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                notFound:
                  value:
                    error: "Rental not found for ID a04dM00000Invalid."
                    statusCode: 404
        '401':
          description: Отсътства или невалиден токен

    patch:
      tags:
        - Rentals
      summary: Обновяване на наемането
      description: Частично обновяване на данните на наемането (статус, платежно състояние)
      operationId: updateRental
      parameters:
        - name: id
          in: path
          required: true
          description: ID на наемането
          schema:
            type: string
            example: "a04dM00000YaPY3QAN"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RentalInput'
            examples:
              updateRental:
                value:
                  status: "Completed"
                  paid: true
      responses:
        '200':
          description: Наемание успешно обновено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RentalDto'
              examples:
                success:
                  value:
                    id: "a04dM00000YaPY3QAN"
                    bikeId: "a02dM00000YaPY1QAN"
                    bikeName: "Mountain Bike Pro"
                    customerId: "a03dM00000YaPY2QAN"
                    customerName: "Aleksandar Aleksandrov"
                    startDate: "2026-03-01"
                    endDate: "2026-03-05"
                    dailyPrice: 25.00
                    totalAmount: 100.00
                    status: "Completed"
                    paid: true
        '400':
          description: Невалидни входни данни
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidStatus:
                  value:
                    error: "Invalid status. Valid values are: Active, Completed, Cancelled"
                    statusCode: 400
        '404':
          description: Наемането не намерено
        '401':
          description: Отсътства или невалиден токен

    delete:
      tags:
        - Rentals
      summary: Изтриване на наемането
      description: Премахва наемането от системата
      operationId: deleteRental
      parameters:
        - name: id
          in: path
          required: true
          description: ID на наемането
          schema:
            type: string
            example: "a04dM00000YaPY3QAN"
      responses:
        '204':
          description: Наемание успешно изтрито
        '404':
          description: Наемането не намерено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                notFound:
                  value:
                    error: "Rental not found for ID a04dM00000Invalid."
                    statusCode: 404
        '401':
          description: Отсътства или невалиден токен
        '403':
          description: Нямаш разрешение за изтриване
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                noDeleteAccess:
                  value:
                    error: "No delete access to Bike Rental."
                    statusCode: 403

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: OAuth 2.0 Bearer token от Salesforce

  schemas:
    BikeDto:
      type: object
      required:
        - id
        - name
        - model
        - brand
        - category
        - dailyRate
      properties:
        id:
          type: string
          description: Уникален идентификатор на мотоциклетата
          example: "a02dM00000YaPY1QAN"
        name:
          type: string
          maxLength: 255
          description: Име на мотоциклетата
          example: "Mountain Bike Pro"
        model:
          type: string
          maxLength: 255
          description: Модел на мотоциклетата
          example: "MTB-2024"
        brand:
          type: string
          maxLength: 255
          description: Марка на мотоциклетата
          example: "Trek"
        category:
          type: string
          enum: [Mountain, Road, Cruiser, Hybrid]
          description: Категория
          example: "Mountain"
        dailyRate:
          type: number
          format: double
          minimum: 0
          description: Дневна такса за наемане
          example: 25.00
        available:
          type: boolean
          description: Дали мотоциклетата е налична за наемане
          example: true
        mileage:
          type: number
          format: double
          minimum: 0
          description: Пробег на мотоциклетата в км
          example: 150
        lastServiceDate:
          type: string
          format: date
          nullable: true
          description: Дата на последното обслужване
          example: "2026-02-15"

    BikeInput:
      type: object
      required:
        - name
        - model
        - brand
        - category
        - dailyRate
      properties:
        name:
          type: string
          maxLength: 255
          description: Име на мотоциклетата
          example: "City Bike"
        model:
          type: string
          maxLength: 255
          description: Модел
          example: "CB-100"
        brand:
          type: string
          maxLength: 255
          description: Марка
          example: "Giant"
        category:
          type: string
          enum: [Mountain, Road, Cruiser, Hybrid]
          description: Категория
          example: "Hybrid"
        dailyRate:
          type: number
          format: double
          minimum: 0
          description: Дневна такса
          example: 15.00
        available:
          type: boolean
          description: Наличност
          example: true
        mileage:
          type: number
          format: double
          minimum: 0
          description: Пробег
          example: 0
        lastServiceDate:
          type: string
          format: date
          nullable: true
          description: Дата на обслужване
          example: null

    BikeListResponse:
      type: object
      properties:
        records:
          type: array
          items:
            $ref: '#/components/schemas/BikeDto'
        total:
          type: integer
          description: Общо брой записи
          example: 5
        page:
          type: integer
          description: Текущ номер на страница
          example: 1
        pageSize:
          type: integer
          description: Брой записи на страница
          example: 10

    CustomerDto:
      type: object
      required:
        - id
        - name
        - email
      properties:
        id:
          type: string
          description: Уникален идентификатор на клиента
          example: "a03dM00000YaPY2QAN"
        name:
          type: string
          maxLength: 255
          description: Пълно име на клиента
          example: "Aleksandar Aleksandrov"
        firstName:
          type: string
          maxLength: 255
          description: Първо име
          example: "Aleksandar"
        lastName:
          type: string
          maxLength: 255
          description: Фамилия
          example: "Aleksandrov"
        email:
          type: string
          format: email
          maxLength: 255
          description: Имейл адрес
          example: "aleksander.aleksandrov923@gmail.com"
        phone:
          type: string
          maxLength: 20
          pattern: '^\+?[0-9\s\-\(\)]+$'
          description: Телефонен номер (формат е проверен)
          example: "0878955771"
        birthDate:
          type: string
          format: date
          nullable: true
          description: Дата на раждане
          example: null
        loyaltyPoints:
          type: integer
          minimum: 0
          description: Брой точки за лояност
          example: 0
        isActive:
          type: boolean
          description: Активен ли е клиентът
          example: true

    CustomerInput:
      type: object
      required:
        - firstName
        - lastName
        - email
      properties:
        firstName:
          type: string
          maxLength: 255
          description: Първо име
          example: "John"
        lastName:
          type: string
          maxLength: 255
          description: Фамилия
          example: "Doe"
        email:
          type: string
          format: email
          maxLength: 255
          description: Имейл адрес
          example: "john.doe@example.com"
        phone:
          type: string
          maxLength: 20
          pattern: '^\+?[0-9\s\-\(\)]+$'
          description: Телефонен номер (формат е проверен на сервъра)
          example: "0888123456"
        birthDate:
          type: string
          format: date
          nullable: true
          description: Дата на раждане
          example: "1990-05-15"
        loyaltyPoints:
          type: integer
          minimum: 0
          description: Начални точки за лояност
          example: 0
        isActive:
          type: boolean
          description: Активност на клиента
          example: true

    CustomerListResponse:
      type: object
      properties:
        records:
          type: array
          items:
            $ref: '#/components/schemas/CustomerDto'
        total:
          type: integer
          description: Общо брой записи
          example: 1
        page:
          type: integer
          description: Текущ номер на страница
          example: 1
        pageSize:
          type: integer
          description: Брой записи на страница
          example: 10

    RentalDto:
      type: object
      required:
