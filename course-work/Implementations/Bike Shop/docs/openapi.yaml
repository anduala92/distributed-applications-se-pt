        bikeId:
          type: string
          description: ID на наетата мотоциклета
          example: "a02dM00000YaPY1QAN"
        bikeName:
          type: string
          description: Име на наетата мотоциклета
          example: "Mountain Bike Pro"
        customerId:
          type: string
          description: ID на клиента
          example: "a03dM00000YaPY2QAN"
        customerName:
          type: string
          description: Име на клиента
          example: "Aleksandar Aleksandrov"
        startDate:
          type: string
          format: date
          description: Дата на начало на наемането
          example: "2026-03-01"
        endDate:
          type: string
          format: date
          description: Дата на край на наемането
          example: "2026-03-05"
        dailyPrice:
          type: number
          format: double
          minimum: 0
          description: Дневна цена на наемането
          example: 25.00
        totalAmount:
          type: number
          format: double
          minimum: 0
          description: Обща сума за наемането
          example: 100.00
        status:
          type: string
          enum: [Active, Completed, Cancelled]
          description: Статус на наемането
          example: "Active"
        paid:
          type: boolean
          description: Дали наемането е платено
          example: false

    RentalInput:
      type: object
      required:
        - bikeId
        - customerId
        - startDate
        - endDate
      properties:
        bikeId:
          type: string
          description: ID на мотоциклетата
          example: "a02dM00000YaPY1QAN"
        customerId:
          type: string
          description: ID на клиента
          example: "a03dM00000YaPY2QAN"
        startDate:
          type: string
          format: date
          description: Дата на начало
          example: "2026-03-10"
        endDate:
          type: string
          format: date
          description: Дата на край
          example: "2026-03-15"
        status:
          type: string
          enum: [Active, Completed, Cancelled]
          description: Статус
          example: "Active"
        paid:
          type: boolean
          description: Платежен статус
          example: false

    RentalListResponse:
      type: object
      properties:
        records:
          type: array
          items:
            $ref: '#/components/schemas/RentalDto'
        total:
          type: integer
          description: Общо брой записи
          example: 1
        page:
          type: integer
          description: Текущ номер на страница
          example: 1
        pageSize:
          type: integer
          description: Брой записи на страница
          example: 10

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Описание на грешката
          example: "Model is required and cannot be blank."
        statusCode:
          type: integer
          description: HTTP статус код
          example: 400